name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs: a new push to a PR (or main) stops the previous run
# for the same ref instead of leaving both to burn runners to completion.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck (severity=warning)
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          # warning severity (#202): quoting/word-splitting/unused-var classes
          # are checked; intentional patterns carry targeted per-line
          # `# shellcheck disable=SCxxxx` comments with reasons.
          SHELLCHECK_OPTS: --severity=warning
        with:
          severity: warning
          scandir: "."
          # Shipped scripts carry a .sh extension, so the action's built-in
          # *.sh discovery finds them; additional_files covers the
          # extension-less githooks/pre-push.
          additional_files: "pre-push"
          ignore_paths: >-
            node_modules
            .git

  tsc:
    name: tsc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install hook type definitions
        working-directory: claude/hooks
        # bun-types and @types/node are referenced by tsconfig.json.
        # Install them locally for the type-check; they are not runtime deps.
        run: bun add --dev bun-types @types/node

      - name: Type-check Claude hooks
        working-directory: claude/hooks
        run: bunx tsc --noEmit

  # doc-truth is a required status check (branch protection), so it stays its
  # own job under that exact name. Keep this in sync with the required checks.
  doc-truth:
    name: doc-truth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run checker self-tests
        run: claude/scripts/tests/doc-truth.test.sh

      - name: Check the dotfiles doc contract
        run: claude/scripts/check-doc-truth.sh

  # The remaining pure-bash checkers (none of them required status checks) share
  # one runner + one checkout instead of paying a spin-up each — each finishes in
  # well under a second. `if: ${{ !cancelled() }}` runs every step even after an
  # earlier one fails, so a single run surfaces all failures at once (as separate
  # parallel jobs used to). Do NOT fold doc-truth/shellcheck/tsc in here — those
  # are required checks and must report under their own names.
  checks:
    name: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: doc-refs (self-test + checker)
        if: ${{ !cancelled() }}
        run: |
          claude/scripts/tests/doc-refs.test.sh
          claude/scripts/check-doc-refs.sh

      - name: no-personal-data (self-test + checker)
        if: ${{ !cancelled() }}
        run: |
          claude/scripts/tests/no-personal-data.test.sh
          claude/scripts/check-no-personal-data.sh

      - name: agent-parity (self-test + checker)
        if: ${{ !cancelled() }}
        run: |
          claude/scripts/tests/agent-parity.test.sh
          claude/scripts/check-agent-parity.sh

      - name: skill-parity (self-test + checker)
        if: ${{ !cancelled() }}
        run: |
          claude/scripts/tests/skill-parity.test.sh
          claude/scripts/check-skill-parity.sh

      - name: install-integrity (self-test + checker)
        if: ${{ !cancelled() }}
        run: |
          claude/scripts/tests/install-integrity.test.sh
          claude/scripts/check-install-integrity.sh

      # Self-test only: the checker sweeps a live ~/.claude, which the CI
      # runner doesn't have; the fixtures point it at throwaway CLAUDE_DIRs
      # via CLAUDE_DIR (issue #231).
      - name: deployed-orphans (self-test)
        if: ${{ !cancelled() }}
        run: claude/scripts/tests/deployed-orphans.test.sh

      # AGENTPACK.yaml is GENERATED from skill/agent frontmatter + the meta
      # fragment (issue #207) — assert the committed manifest is current.
      - name: agentpack-generated (manifest matches frontmatter)
        if: ${{ !cancelled() }}
        run: claude/scripts/gen-agentpack.sh --check

      # Self-test only: the gate itself needs an authenticated `agy`, so the
      # fixtures stub it with a PATH shim and assert the gate's parsing/fail-
      # closed behavior (#152/#153/#154).
      - name: antigravity-review-gate (self-test)
        if: ${{ !cancelled() }}
        run: claude/scripts/tests/antigravity-review-gate.test.sh
      - name: codex-review-gate (self-test)
        if: ${{ !cancelled() }}
        run: claude/scripts/tests/codex-review-gate.test.sh
      # setup.sh --dry-run must never write to $HOME (issue #133). The test
      # runs the installer against a throwaway HOME and asserts a
      # byte-identical before/after snapshot.
      - name: setup-dry-run (no-writes contract)
        if: ${{ !cancelled() }}
        run: claude/scripts/tests/setup-dry-run.test.sh

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks scans full history on PRs; depth 0 gives it the commits.
          fetch-depth: 0

      - name: Scan for committed secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Config lives at repo root (.gitleaks.toml); the action auto-detects it.

  commit-format:
    name: commit-format
    # Lint the commits a PR adds; on a direct push to main there is no range.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run checker self-tests
        run: claude/scripts/tests/commit-format.test.sh

      - name: Lint PR commit messages (conventional commits)
        # SHAs come in via env (not interpolated into the script) per GitHub's
        # workflow-injection guidance, even though commit SHAs aren't free text.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: claude/scripts/check-commit-format.sh "$BASE_SHA" "$HEAD_SHA"
