name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck (severity=error)
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: --severity=error
        with:
          severity: error
          scandir: "."
          additional_files: >-
            setup.sh
            check-claude.sh
            check-codex.sh
            gh-bootstrap.sh
            git-hygiene.sh
            hygiene-status.sh
          # Restrict scan to the shell files we ship.
          ignore_paths: >-
            node_modules
            .git
          # The action discovers *.sh automatically; the additional_files entries
          # are belt-and-suspenders for the top-level scripts that lack a shebang
          # detection edge case.

  tsc:
    name: tsc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install hook type definitions
        working-directory: claude/hooks
        # bun-types and @types/node are referenced by tsconfig.json.
        # Install them locally for the type-check; they are not runtime deps.
        run: bun add --dev bun-types @types/node

      - name: Type-check Claude hooks
        working-directory: claude/hooks
        run: bunx tsc --noEmit

  doc-refs:
    name: doc-refs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check doc references resolve (hooks + skills)
        run: claude/scripts/check-doc-refs.sh

  leak-scan:
    name: leak-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tracked files for machine-specific home paths
        run: claude/scripts/check-no-personal-data.sh

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks scans full history on PRs; depth 0 gives it the commits.
          fetch-depth: 0

      - name: Scan for committed secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Config lives at repo root (.gitleaks.toml); the action auto-detects it.

  agent-parity:
    name: agent-parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Claude/Codex rule-set parity
        run: claude/scripts/check-agent-parity.sh

  skill-parity:
    name: skill-parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check skill count + cross-tool artifact shapes
        run: claude/scripts/check-skill-parity.sh

  commit-format:
    name: commit-format
    # Lint the commits a PR adds; on a direct push to main there is no range.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint PR commit messages (conventional commits)
        # SHAs come in via env (not interpolated into the script) per GitHub's
        # workflow-injection guidance, even though commit SHAs aren't free text.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: claude/scripts/check-commit-format.sh "$BASE_SHA" "$HEAD_SHA"
