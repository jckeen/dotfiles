name: smoke-install

# Rationale: read-only smoke for setup.sh and the shell rc files on a fresh
# runner. We deliberately don't run the full installer — fresh runners don't
# have Homebrew, Claude Code, or Codex, and the audit-mode `--check` flag
# expects symlinks to already exist (so it would always report MISSING). What
# we CAN cheaply verify on every PR is that the scripts parse cleanly and the
# argument plumbing (--help) responds.
#
# Marked continue-on-error: true for the FIRST SIX MONTHS (through ~2026-11-19)
# while we extend coverage. After that, flip continue-on-error to false and
# start gating PRs on it.

on:
  pull_request:
    paths:
      - "setup.sh"
      - "check-claude.sh"
      - "gh-bootstrap.sh"
      - ".bash_aliases"
      - ".bash_profile"
  workflow_dispatch:

jobs:
  smoke:
    name: setup.sh syntax + --help
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # See rationale at top of file. Remove once stable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check shell scripts
        run: |
          set -euo pipefail
          for f in setup.sh check-claude.sh check-codex.sh gh-bootstrap.sh git-hygiene.sh hygiene-status.sh .bash_aliases .bash_profile; do
            if [ -f "$f" ]; then
              echo "==> bash -n $f"
              bash -n "$f"
            fi
          done

      - name: setup.sh --help responds
        run: |
          # --help should print usage and exit 0 without doing any real work.
          ./setup.sh --help > /tmp/help.out 2>&1 || {
            echo "::error::./setup.sh --help failed on ${{ matrix.os }}"
            cat /tmp/help.out
            exit 1
          }
          # Sanity: help output should mention at least one known flag.
          grep -qE -- "--check|--dry-run|--repair" /tmp/help.out || {
            echo "::error::./setup.sh --help on ${{ matrix.os }} did not include expected flags"
            cat /tmp/help.out
            exit 1
          }
          echo "✓ ./setup.sh --help OK on ${{ matrix.os }}"
